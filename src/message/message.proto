syntax = "proto3";

package protocol;

enum OpType{
	UNKNOW = 0;
	ADD_PROTECT_FILE = 1;
	REMOVE_PROTECT_FILE = 2;
	ADD_WHITE_PROCESS = 3;
	REMOVE_WHITE_PROCESS = 4;
	EVENT_REPORT = 5;
	HEARTBEAT = 6;
	OPT = 7;
}

message FileRequest {
    string path = 1;
}

message ProcessRequest {
    string path = 1;
}

message EventReport {
    string comm = 1;
    uint64 inode = 2;
    uint32 op = 3;
    bool success = 4;
}

message MsgPayload {
    oneof payload {
        FileRequest file_req = 1;
        ProcessRequest proc_req = 2;
        EventReport event_rpt = 3;
    }
}
